    function setToToday() { const dp = document.getElementById('date-picker'); const now = new Date(); dp.value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`; renderContent(now); }

function formatToCircle(text) {
    return text.replace(/「(.)」/g, '<span class="wrong-word-container">$1<span class="red-circle"></span></span>');
}


function formatEnglish(text) {
    return text.split("\n").map(line => {

        const match = line.match(/^(.+?)\s(\(.+?\))\s(\/.+?\/)\s(.+)$/);

        if (match) {
            const word = match[1];
            const type = match[2];
            const phonetic = match[3];
            const meaning = match[4];

            return `${word} ${phonetic} ${type} ${meaning}`;
        }

        return line;

    }).join("\n");
}
